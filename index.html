body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f0f0ee;color:#111;min-height:100vh;padding:20px 16px}
.wrap{max-width:980px;margin:0 auto}
input,select{font-family:inherit;font-size:13px;padding:7px 11px;border-radius:7px;border:1.5px solid #d0d0d0;background:#fff;color:#111;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#C41230;box-shadow:0 0 0 3px rgba(196,18,48,.10)}
button{font-family:inherit;cursor:pointer;border-radius:7px;border:1.5px solid #ccc;background:#fff;color:#111;font-size:12px;padding:7px 15px;transition:all .15s;white-space:nowrap}

.card{background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:500}

// ─────────────────────────────────────────────────────────────────────────────
// SCORING ENGINE — deterministic, no API needed
// ─────────────────────────────────────────────────────────────────────────────
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}

function scoreHandle(handle, channel){
  if(!handle||handle.trim()==="")return null;
  const h=handle.trim().toLowerCase();
  // Signals
  const hasHttp    = h.startsWith("http");
  const hasAt      = h.startsWith("@");
  const hasDot     = h.includes(".");
  const isLong     = h.replace(/[@\/.]/g,"").length > 6;
  const hasNumbers = /\d/.test(h);
  const isPlaceholder = h.includes("example")||h.includes("unknown")||h.includes("placeholder")||h==="n/a";
  if(isPlaceholder)return null;

  // Base score from signals
  let base = 35;
  if(hasHttp||hasDot) base += 18;
  if(hasAt)           base += 8;
  if(isLong)          base += 10;
  if(!hasNumbers)     base += 5;

  // Channel-specific boosts
  if(channel==="Website"&&(hasHttp||hasDot)) base += 14;
  if(channel==="Google"&&h.length>4)         base += 12;
  if(channel==="Facebook"&&hasDot)           base += 10;

  // Seed variance per KPI using hash
  return base;
}

function generateScores(dealerName, handles){
  const scores={};
  const nameSeed = hashStr(dealerName);

  for(const ch of CHANNELS){
    scores[ch]={};
    const handle = handles[ch]||"";
    const baseScore = scoreHandle(handle, ch);

    for(let i=0;i<KPIS[ch].length;i++){
      const kpi=KPIS[ch][i];
      if(baseScore===null){
        scores[ch][kpi]=null;
        continue;
      }
      // Deterministic variance: hash of dealer+channel+kpi index
      const seed = (nameSeed + hashStr(ch) + i*137) % 1000;
      const variance = (seed % 30) - 12; // -12 to +17
      let val = Math.min(95, Math.max(15, baseScore + variance));
      // KPI-specific modifiers
      if(kpi==="Profile Completeness"||kpi==="Contact Info")    val = Math.min(95, val+8);
      if(kpi==="Paid Activity"||kpi==="Chatbot Presence")        val = Math.max(15, val-15);
      if(kpi==="Follower Count"||kpi==="Subscriber Count")       val = Math.max(15, val-5);
      if(kpi==="Engagement Rate")                                val = Math.max(15, val-8);
      scores[ch][kpi]=Math.round(val);
    }
  }
  return scores;
}

function scoreColor(s){
  if(s===null||s===undefined)return{bg:"#ebebeb",text:"#888"};
  if(s>=90)return{bg:"#d0edda",text:"#145c2a"};
  if(s>=80)return{bg:"#cce5ff",text:"#004085"};
  if(s>=70)return{bg:"#d1ecf1",text:"#0c5460"};
  if(s>=60)return{bg:"#fff3cd",text:"#7a5700"};
  return{bg:"#fde8ec",text:"#8b0000"};
}
function grade(s){if(s===null||s===undefined)return"—";if(s>=90)return"A";if(s>=80)return"B";if(s>=70)return"C";if(s>=60)return"D";return"F";}
function avg(arr){const v=arr.filter(x=>x!==null&&x!==undefined&&!isNaN(x));if(!v.length)return null;return Math.round(v.reduce((a,b)=>a+b,0)/v.length);}

function slugify(name){
  return name.toLowerCase()
    .replace(/[^a-z0-9\s]/g,"")
    .trim().replace(/\s+/g,"");
}
function shortSlug(name){
  const stop=["marine","boat","watersports","water","sports","lake","sea","bay","coast","river","motorsports","center","centre","powersports","sales","group","llc","inc","co","the"];
  return name.toLowerCase()
    .split(/\s+/)
    .filter(w=>!stop.includes(w))
    .join("")
    .replace(/[^a-z0-9]/g,"") || slugify(name);
}
function inferHandles(name, website){
  if(!name||name.trim().length<2)return {};
  const full=slugify(name);
  const short=shortSlug(name)||full;
  const site=website
    ? (website.match(/^https?:\/\//)?website:"https://"+website.replace(/^\s+|\s+$/g,""))
    : "https://www."+full+".com";
  return {
    "Facebook":  "facebook.com/"+full,
    "Instagram": "@"+short,
    "X (Twitter)":"@"+short,
    "YouTube":   "youtube.com/@"+full,
    "TikTok":    "@"+short,
    "LinkedIn":  "linkedin.com/company/"+full,
    "Website":   site,
    "Google":    name.trim(),
  };
}

function saveState(){
  try{

      reps: S.reps,
      dealers: S.dealers,
      selectedRep: S.selectedRep,
    }));
  }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      if(saved.dealers && saved.dealers.length){
        S.dealers = saved.dealers;
        // Ensure all dealers have verified field
        S.dealers.forEach(d=>{ if(!d.verified)d.verified={}; if(!d.scores)d.scores={}; });

      if(saved.reps && saved.reps.length===4) S.reps = saved.reps;
      if(saved.selectedRep) S.selectedRep = saved.selectedRep;
    }
  }catch(e){}
}

}

function h(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k==="class"){e.className=v;}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else{e.setAttribute(k,v);}
  }
  for(const c of kids){
    if(c==null)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  }
  return e;
}
function div(cls,props={},...kids){return h("div",{class:cls,...props},...kids);}
function btn(label,cls,onClick,disabled=false){return h("button",{class:cls,onClick,disabled:disabled||undefined},label);}
function txt(tag,cls,content,extra={}){return h(tag,{class:cls,...extra},content);}

// ─────────────────────────────────────────────────────────────────────────────
// UPLOAD / PASTE LIST PARSER
// Accepts CSV, TSV, or plain text. Columns: Name, Website (optional), Rep (optional)
// ─────────────────────────────────────────────────────────────────────────────
function parseAndImportList(text, defaultRep){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith("#"));
  let added=0, skipped=0, skipNames=[];

  // Detect delimiter
  const delim = lines[0]&&lines[0].includes("\t") ? "\t" : ",";

  // Skip header row if first line looks like a header
  const startIdx = /^(name|dealer|company)/i.test(lines[0].split(delim)[0]) ? 1 : 0;

  for(let i=startIdx;i<lines.length;i++){
    const parts = lines[i].split(delim).map(p=>p.trim().replace(/^["']|["']$/g,""));
    const name = parts[0];
    if(!name){continue;}
    if(S.dealers.find(d=>d.name===name)){skipped++;skipNames.push(name);continue;}
    const website = parts[1]||"";
    const rep = (parts[2]&&S.reps.includes(parts[2])) ? parts[2] : defaultRep;
    S.dealers.push({
      name,
      rep,
      pin:null,
      website,
      handles: inferHandles(name, website),
      verified:{},
      scores:{},
      lastUpdated:null,
      ready:false,
    });
    // Auto-score immediately
    autoScore(S.dealers[S.dealers.length-1]);
    added++;
  }
  return {added, skipped, skipNames};
}

// ─────────────────────────────────────────────────────────────────────────────
// BRAND LINK CHECKER
// Uses allorigins.win CORS proxy to fetch dealer website and scan for brand links
// ─────────────────────────────────────────────────────────────────────────────
async function runLinkCheck(d, cardEl){
  const rawSite = d.handles?.["Website"] || d.website || "";
  if(!rawSite){return;}
  const siteUrl = rawSite.match(/^https?:\/\//)? rawSite : "https://"+rawSite;

  const brands=[
    {key:"centurion", domain:"centurionboats.com"},
    {key:"supreme",   domain:"supremetowboats.com"},
  ];

  // Set all to "checking"
  brands.forEach(b=>{
    d.linkCheck = d.linkCheck||{};
    d.linkCheck[b.key]="checking";
    const badge=cardEl.querySelector("[data-brand-badge='"+b.key+"']");
    if(badge){badge.textContent="Checking…";badge.style.background="#e8f4fd";badge.style.color="#0c4a7a";}
  });

  // Disable the check button
  const checkBtn=cardEl.querySelector("button");
  if(checkBtn){checkBtn.disabled=true;checkBtn.textContent="Checking…";}

  try{
    // allorigins.win returns JSON with .contents = raw HTML
    const proxyUrl = "https://api.allorigins.win/get?url="+encodeURIComponent(siteUrl);
    const resp = await fetch(proxyUrl, {signal: AbortSignal.timeout(12000)});
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const json = await resp.json();
    const html = (json.contents||"").toLowerCase();

    brands.forEach(b=>{
      const found = html.includes(b.domain.toLowerCase());
      d.linkCheck[b.key] = found ? "found" : "missing";
      const badge=cardEl.querySelector("[data-brand-badge='"+b.key+"']");
      if(badge){
        badge.textContent = found ? "✓ Link found" : "✗ No link found";
        badge.style.background = found ? "#d0edda" : "#fde8ec";
        badge.style.color      = found ? "#145c2a" : "#8b0000";
      }
    });
    d.linkCheckDate = new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
  }catch(err){
    brands.forEach(b=>{
      d.linkCheck[b.key]="error";
      const badge=cardEl.querySelector("[data-brand-badge='"+b.key+"']");
      if(badge){
        const isTimeout = err.name==="TimeoutError"||err.message.includes("timeout");
        badge.textContent = isTimeout ? "Timed out" : "Could not fetch";
        badge.style.background="#fff8e6";badge.style.color="#7a5700";
      }
    });
    d.linkCheckDate = new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
    // Show a helpful note
    const note=cardEl.querySelector("[data-fetch-note]");
    if(!note){
      const msg=h("div",{"data-fetch-note":"1",style:{marginTop:"8px",fontSize:"11px",color:"#7a5700",background:"#fff8e6",borderRadius:"7px",padding:"8px 12px",border:"1px solid #f0d890",lineHeight:"1.6"}},
        "⚠ Could not fetch the website. This can happen if the dealer's site blocks external requests. You can manually open the site and search for 'centurionboats.com' and 'supremetowboats.com' links."
      );
      cardEl.appendChild(msg);
    }
  }

  if(checkBtn){checkBtn.disabled=false;checkBtn.textContent="▶ Re-check";}
  saveState();
}

function headerBar(){

  left.appendChild(makeLogo());
  left.appendChild(h("div",{style:{color:"#aaa",fontSize:"11px",letterSpacing:"1px",fontWeight:"500"}},"DEALER DIGITAL SCORECARD TOOL"));
  wrap.appendChild(left);

  const btnRow=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}});
  btnRow.appendChild(h("button",{style:{fontSize:"11px",padding:"5px 12px",background:"transparent",color:"#bbb",border:"1px solid #555",borderRadius:"7px"},onClick:()=>{S.view="methodology";R();}},"Scoring guide"));

  // ── Upload list button ──────────────────────────────────────────────────

  uploadBtn.addEventListener("click",()=>{ showUploadModal(); });

  btnRow.appendChild(h("button",{class:"btn-red",style:{fontSize:"12px"},onClick:()=>{S.view="add";R();}},"+ Add dealer"));
  wrap.appendChild(btnRow);
  return wrap;
}

// ─────────────────────────────────────────────────────────────────────────────
// UPLOAD MODAL
// ─────────────────────────────────────────────────────────────────────────────
function showUploadModal(){
  // Remove any existing modal
  document.getElementById("upload-modal-wrap")?.remove();

  const overlay=h("div",{id:"upload-modal-wrap",style:{
    position:"absolute",top:"0",left:"0",width:"100%",minHeight:"100%",
    background:"rgba(0,0,0,0.45)",zIndex:"999",
    display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"60px"
  }});

  const modal=h("div",{style:{
    background:"#fff",borderRadius:"14px",padding:"24px 26px",width:"520px",
    maxWidth:"calc(100vw - 32px)",boxShadow:"0 8px 40px rgba(0,0,0,0.18)"
  }});

  modal.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
    h("div",{style:{fontWeight:"700",fontSize:"15px"}},"Upload dealer list"),
    h("button",{style:{fontSize:"16px",background:"none",border:"none",color:"#888",padding:"0 4px",lineHeight:"1"},
      onClick:()=>overlay.remove()},"×")
  ));
  modal.appendChild(h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"14px",lineHeight:"1.65"}},"Upload a CSV or TXT file, or paste your list below. One dealer per line. Columns: ",h("strong",{},"Name, Website, Rep")," (Rep is optional — defaults to the current filter)."));

  // Format example
  modal.appendChild(h("div",{style:{background:"#f8f8f6",borderRadius:"7px",padding:"8px 12px",marginBottom:"14px",fontFamily:"monospace",fontSize:"11px",color:"#555",border:"1px solid #eee"}},
    "Lake Life Marine, www.lakelifemarine.com, West",h("br"),
    "Wake Zone Boats, wakezone.com, East",h("br"),
    "Blue Water Marine, www.bluewatermarine.com"
  ));

  // File upload
  const fileInput=h("input",{type:"file",accept:".csv,.txt,.tsv",style:{marginBottom:"10px",width:"100%",fontSize:"12px"}});
  let fileText="";
  fileInput.addEventListener("change",()=>{
    const f=fileInput.files[0];
    if(!f)return;
    const reader=new FileReader();
    reader.onload=e=>{fileText=e.target.result;textarea.value=fileText;};
    reader.readAsText(f);
  });
  modal.appendChild(h("div",{class:"field"},h("label",{},"Upload CSV / TXT file"),fileInput));

  // Paste area
  const textarea=h("textarea",{placeholder:"Or paste your list here…",style:{
    width:"100%",height:"120px",fontFamily:"monospace",fontSize:"12px",
    padding:"8px 10px",borderRadius:"7px",border:"1.5px solid #ccc",
    resize:"vertical",color:"#111",background:"#fff"
  }});
  modal.appendChild(h("div",{class:"field"},h("label",{},"Or paste list"),textarea));

  // Rep assignment for this import
  const repSel=h("select",{style:{marginTop:"4px"}});
  const autoOpt=h("option",{value:"__auto__"},"Auto-detect from list (or use current filter)");
  repSel.appendChild(autoOpt);
  for(const r of S.reps){const o=h("option",{value:r},r);repSel.appendChild(o);}
  // Pre-select current filter
  if(S.selectedRep!=="all"){repSel.value=S.selectedRep;}
  modal.appendChild(h("div",{class:"field"},h("label",{},"Assign to rep (if not specified in list)"),repSel));

  // Result message area
  const resultDiv=h("div",{style:{display:"none",marginBottom:"10px"}});
  modal.appendChild(resultDiv);

  // Buttons
  const btnRow=h("div",{style:{display:"flex",gap:"8px",marginTop:"4px"}});
  const importBtn=h("button",{class:"btn-red",style:{flex:"1",padding:"9px"}},"Import dealers");
  importBtn.addEventListener("click",()=>{
    const raw=textarea.value.trim();
    if(!raw){resultDiv.textContent="Please paste a list or upload a file first.";resultDiv.style.display="block";resultDiv.className="error-box";return;}
    const defaultRep = repSel.value==="__auto__"
      ? (S.selectedRep==="all"?S.reps[0]:S.selectedRep)
      : repSel.value;
    const {added,skipped,skipNames}=parseAndImportList(raw,defaultRep);
    if(added===0&&skipped>0){
      resultDiv.innerHTML="<strong>No new dealers added</strong> — all "+skipped+" dealer"+(skipped!==1?"s":"")+" in the list already exist.";
      resultDiv.className="warn-box";resultDiv.style.display="block";
      return;
    }
    resultDiv.innerHTML="<strong>✓ "+added+" dealer"+(added!==1?"s":"")+" imported</strong>"+(skipped>0?" ("+skipped+" skipped — already exist)":"")+".<br>Handles auto-filled. Open each dealer to verify and run analysis.";
    resultDiv.className="info-box";resultDiv.style.display="block";
    importBtn.textContent="✓ Done";importBtn.disabled=true;
    // Switch to the rep we just imported into
    S.selectedRep=defaultRep;
    setTimeout(()=>{overlay.remove();R();},1400);
  });
  btnRow.appendChild(importBtn);
  btnRow.appendChild(h("button",{style:{padding:"9px 18px"},onClick:()=>overlay.remove()},"Cancel"));
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  // Append to app wrapper so it scrolls with content
  document.querySelector(".wrap").style.position="relative";
  document.querySelector(".wrap").appendChild(overlay);

  // Close on backdrop click
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
}

// REP FILTER BAR
// ─────────────────────────────────────────────────────────────────────────────
function repBar(){
  const bar=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px",alignItems:"center"}});
  bar.appendChild(h("span",{style:{fontSize:"11px",color:"#777",marginRight:"2px"}},"Filter:"));
  const allA=S.selectedRep==="all";
  bar.appendChild(h("button",{style:{fontSize:"12px",padding:"5px 14px",borderRadius:"20px",fontWeight:allA?"700":"400",background:allA?DARK:"#fff",color:allA?"#fff":"#444",border:allA?"1.5px solid "+DARK:"1.5px solid #ccc"},onClick:()=>{S.selectedRep="all";R();}},"All dealers"));
  for(const rep of S.reps){
    const a=S.selectedRep===rep;
    const cnt=S.dealers.filter(d=>d.rep===rep).length;
    const b=h("button",{style:{fontSize:"12px",padding:"5px 14px",borderRadius:"20px",fontWeight:a?"700":"400",background:a?BRAND:"#fff",color:a?"#fff":"#444",border:a?"1.5px solid "+BRAND:"1.5px solid #ccc"},onClick:()=>{S.selectedRep=rep;R();}},
      rep," ",h("span",{style:{fontSize:"10px",padding:"1px 6px",borderRadius:"10px",marginLeft:"2px",background:a?"rgba(255,255,255,.25)":"#eee",color:a?"#fff":"#666"}},cnt)
    );
    bar.appendChild(b);
  }
  bar.appendChild(h("button",{style:{fontSize:"10px",padding:"4px 10px",borderRadius:"20px",color:"#888",border:"1px dashed #ccc",background:"transparent",marginLeft:"4px"},onClick:()=>{S.view="reps";R();}},"✏ Edit rep names"));
  return bar;
}

// PAGE: LIST
// ─────────────────────────────────────────────────────────────────────────────
function pageList(){
  const wrap=h("div",{class:"fade"});
  wrap.appendChild(headerBar());
  wrap.appendChild(repBar());
  const dealers=visibleDealers();
  wrap.appendChild(h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"10px"}},
    S.selectedRep==="all"
      ?"Showing all "+dealers.length+" dealer"+(dealers.length!==1?"s":"")
      :dealers.length+" dealer"+(dealers.length!==1?"s":"")+" assigned to "+S.selectedRep
  ));
  if(!dealers.length){
    wrap.appendChild(h("div",{style:{background:"#fff",borderRadius:"12px",padding:"36px 20px",textAlign:"center",border:"1.5px solid #ddd"}},
      h("div",{style:{fontSize:"14px",fontWeight:"600",marginBottom:"8px"}},"No dealers yet"),
      h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"16px"}},"Add a dealer to get started. Handles are auto-filled from the dealer name."),
      h("button",{class:"btn-red",onClick:()=>{S.view="add";R();}},"+ Add dealer")
    ));
    return wrap;
  }
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:"12px"}});
  for(const d of dealers){
    const ov=totalAvg(d);const c=scoreColor(ov);
    const card=h("div",{style:{background:"#fff",border:"1.5px solid #ddd",borderRadius:"12px",padding:"14px 16px",cursor:"pointer"},
      onClick:()=>{S.activeName=d.name;S.activeChannel=CHANNELS[0];S.pinInput="";S.pinError="";S.view=d.pin?"pin":"scorecard";R();}
    });
    card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}},
      h("div",{style:{fontWeight:"600",fontSize:"14px",flex:"1",marginRight:"8px"}},d.name),
      ov!=null?h("div",{style:{background:c.bg,color:c.text,borderRadius:"6px",padding:"2px 9px",fontWeight:"700",fontSize:"13px"}},grade(ov)):null
    ));
    const vCount=Object.values(d.verified||{}).filter(Boolean).length;
    card.appendChild(h("div",{style:{display:"flex",gap:"5px",marginBottom:"8px",alignItems:"center",flexWrap:"wrap"}},
      h("span",{style:{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:"#f0f0f0",color:"#555",fontWeight:"500"}},d.rep),
      d.ready?h("span",{style:{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:"#d0edda",color:"#145c2a",fontWeight:"500"}},"✓ Scored"):null,
      vCount>0?h("span",{style:{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:vCount===8?"#d0edda":vCount>=4?"#fff3cd":"#fde8ec",color:vCount===8?"#145c2a":vCount>=4?"#7a5700":"#8b0000",fontWeight:"500"}},vCount+"/8 verified"):null,
      d.lastUpdated?h("span",{style:{fontSize:"10px",color:"#aaa"}},d.lastUpdated):null
    ));
    const pills=h("div",{style:{display:"flex",gap:"3px",flexWrap:"wrap",marginBottom:"10px"}});
    for(const ch of CHANNELS){const s=chAvg(d,ch);const cc=scoreColor(s);pills.appendChild(h("span",{style:{fontSize:"10px",padding:"2px 5px",borderRadius:"4px",background:cc.bg,color:cc.text}},ch.split(" ")[0]+" "+(s!=null?s:"-")));}
    card.appendChild(pills);
    card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{fontSize:"11px",color:BRAND}},d.pin?"🔒 PIN protected":"View scorecard →"),
      h("button",{style:{fontSize:"10px",padding:"2px 7px",borderRadius:"5px",color:"#888",border:"1px solid #ddd"},
        onClick:e=>{e.stopPropagation();if(confirm("Remove "+d.name+"? This cannot be undone.")){S.dealers=S.dealers.filter(x=>x.name!==d.name);R();}}
      },"Remove")
    ));
    grid.appendChild(card);
  }
  wrap.appendChild(grid);
  return wrap;
}

// ─────────────────────────────────────────────────────────────────────────────
// PAGE: ADD DEALER
// Uses a plain <form> approach — no re-render on input, only on save/cancel
// ─────────────────────────────────────────────────────────────────────────────
function pageAdd(){
  const wrap=h("div",{class:"fade",style:{maxWidth:"560px"}});
  wrap.appendChild(h("button",{style:{marginBottom:"14px"},onClick:()=>{S.view="list";R();}},"← Back to dealers"));

  const card=h("div",{class:"card"});
  card.appendChild(h("div",{style:{fontWeight:"600",fontSize:"15px",marginBottom:"4px"}},"Add a dealer"));
  card.appendChild(h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"16px",lineHeight:"1.65"}},"Enter the dealer name and website. Social handles are auto-filled — edit any before saving."));

  // We store form values in a local object, no re-render on each keystroke
  const form={name:"",website:"",rep:S.selectedRep==="all"?S.reps[0]:S.selectedRep,pin:"",handles:{}};

  const errDiv=h("div",{style:{display:"none"}});
  errDiv.className="error-box";

  function showErr(msg){errDiv.textContent=msg;errDiv.style.display="block";}
  function hideErr(){errDiv.style.display="none";}

  // Handle input references so we can read them on save
  const handleInputs={};

  function fillHandles(){
    const inferred=inferHandles(form.name,form.website);
    for(const ch of CHANNELS){
      // Only fill if the field is empty or was auto-filled (not manually changed)
      if(handleInputs[ch]&&(!handleInputs[ch].value||handleInputs[ch].dataset.autofilled==="1")){
        handleInputs[ch].value=inferred[ch]||"";
        handleInputs[ch].dataset.autofilled="1";
      }
    }
  }

  // Name field
  const nameInp=h("input",{placeholder:"e.g. Lake Life Marine",type:"text"});
  nameInp.addEventListener("input",()=>{form.name=nameInp.value;fillHandles();});
  card.appendChild(h("div",{class:"field"},h("label",{},"Dealer name *"),nameInp));

  // Website field
  const siteInp=h("input",{placeholder:"e.g. www.lakelifemarine.com",type:"text"});
  siteInp.addEventListener("input",()=>{form.website=siteInp.value;fillHandles();});
  card.appendChild(h("div",{class:"field"},h("label",{},"Website URL (used to auto-fill handles)"),siteInp));

  // Rep select
  const repSel=h("select");
  for(const r of S.reps){const o=h("option",{value:r},r);if(r===form.rep)o.selected=true;repSel.appendChild(o);}
  repSel.addEventListener("change",()=>{form.rep=repSel.value;});
  card.appendChild(h("div",{class:"field"},h("label",{},"Assign to rep *"),repSel));

  // PIN
  const pinInp=h("input",{placeholder:"Optional numeric PIN",type:"password"});
  pinInp.addEventListener("input",()=>{form.pin=pinInp.value;});
  card.appendChild(h("div",{class:"field"},h("label",{},"Scorecard PIN (optional)"),pinInp));

  // Social handles section
  card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px",marginTop:"4px"}},
    h("div",{style:{fontSize:"13px",fontWeight:"600"}},"Social handles & URLs"),
    h("span",{style:{fontSize:"10px",color:"#999",fontStyle:"italic"}},"Auto-filled · edit any field")
  ));
  const hgrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}});
  for(const ch of CHANNELS){
    const inp=h("input",{placeholder:ch==="Website"?"https://...":ch==="Google"?"Business listing name":"@handle or URL",type:"text"});
    inp.dataset.autofilled="0";
    inp.addEventListener("input",()=>{inp.dataset.autofilled="0";});
    handleInputs[ch]=inp;
    hgrid.appendChild(h("div",{},h("label",{},ch),inp));
  }
  card.appendChild(hgrid);
  card.appendChild(errDiv);

  const saveBtn=h("button",{class:"btn-red",style:{width:"100%",padding:"10px"}},"Save dealer & open scorecard");
  saveBtn.addEventListener("click",()=>{
    const name=nameInp.value.trim();
    if(!name){showErr("Dealer name is required.");return;}
    if(S.dealers.find(d=>d.name===name)){showErr("A dealer with that name already exists.");return;}
    if(pinInp.value&&!/^\d{1,8}$/.test(pinInp.value)){showErr("PIN must be numeric (up to 8 digits).");return;}
    hideErr();
    const handles={};
    for(const ch of CHANNELS){handles[ch]=handleInputs[ch].value.trim();}
    const newDealer = {
      name,
      rep:repSel.value,
      pin:pinInp.value||null,
      handles,
      verified:{},
      website:siteInp.value.trim(),
      scores:{},
      lastUpdated:null,
      ready:false,
    };
    autoScore(newDealer);
    S.dealers.push(newDealer);
    S.activeName=name;
    S.activeChannel=CHANNELS[0];
    S.view="scorecard";
    R();
  });
  card.appendChild(saveBtn);
  wrap.appendChild(card);
  return wrap;
}

// ─────────────────────────────────────────────────────────────────────────────
// PAGE: PIN
// ─────────────────────────────────────────────────────────────────────────────
function pagePin(){
  const wrap=h("div",{class:"fade",style:{maxWidth:"360px",margin:"2rem auto"}});
  wrap.appendChild(h("button",{style:{marginBottom:"14px"},onClick:()=>{S.view="list";R();}},"← Back"));
  const card=h("div",{class:"card"});
  card.appendChild(h("div",{style:{fontWeight:"600",fontSize:"15px",marginBottom:"4px"}},S.activeName));
  card.appendChild(h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"16px"}},"This scorecard is PIN protected."));
  card.appendChild(h("label",{},"Enter PIN"));
  const inp=h("input",{type:"password",placeholder:"PIN",style:{marginTop:"4px",marginBottom:"6px"}});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryPin(inp.value);});
  card.appendChild(inp);
  if(S.pinError)card.appendChild(h("div",{class:"error-box",style:{marginBottom:"8px"}},S.pinError));
  card.appendChild(h("button",{class:"btn-red",style:{width:"100%",marginTop:"8px"}},
    ...["Unlock scorecard"]
  ));
  card.lastChild.addEventListener("click",()=>tryPin(inp.value));
  wrap.appendChild(card);
  setTimeout(()=>inp.focus(),50);
  return wrap;
}
function tryPin(val){
  const d=getDealer(S.activeName);
  if(d&&d.pin===val){S.pinError="";S.view="scorecard";R();}
  else{S.pinError="Incorrect PIN. Try again.";R();}
}

// ─────────────────────────────────────────────────────────────────────────────
// PAGE: SCORECARD
// Scores are auto-generated and saved; KPI inputs update state directly
// ─────────────────────────────────────────────────────────────────────────────
function pageScorecard(){
  const d=getDealer(S.activeName);
  if(!d){S.view="list";R();return h("div");}

  // Auto-score if not yet scored (e.g. freshly added)
  if(!d.ready) autoScore(d);

  const ov=totalAvg(d);const c=scoreColor(ov);
  const wrap=h("div",{class:"fade"});

  // ── Top button bar ──────────────────────────────────────────────────────
  const topBar=h("div",{style:{display:"flex",gap:"8px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}});
  topBar.appendChild(h("button",{onClick:()=>{S.view="list";R();}},"← All dealers"));

  // RE-SCORE — regenerates scores from current handles
  const rescoreBtn=h("button",{class:"btn-dark",style:{fontSize:"12px"}});
  rescoreBtn.appendChild(document.createTextNode("⟳ Re-score"));
  rescoreBtn.addEventListener("click",()=>{
    d.scores=generateScores(d.name,d.handles);
    d.ready=true;
    d.lastUpdated=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    rescoreBtn.textContent="✓ Re-scored!";
    rescoreBtn.disabled=true;
    saveState();
    setTimeout(()=>R(),700);
  });
  topBar.appendChild(rescoreBtn);

  // SHARE WITH DEALER — always available once scored
  topBar.appendChild(h("button",{class:"btn-green",style:{fontSize:"12px"},
    onClick:()=>openSharePDF(d)
  },"↗ Share with dealer"));

  topBar.appendChild(h("button",{style:{fontSize:"11px"},onClick:()=>{S.view="methodology";R();}},"Scoring guide"));
  wrap.appendChild(topBar);

  if(d.lastUpdated){
    wrap.appendChild(h("div",{style:{fontSize:"11px",color:"#888",marginBottom:"8px"}},"Last scored: "+d.lastUpdated));
  }

  // ── Dealer header ────────────────────────────────────────────────────────
  const hdr=h("div",{style:{background:DARK,borderRadius:"12px",padding:"16px 20px",marginBottom:"14px"}});
  hdr.appendChild(h("div",{style:{color:BRAND,fontSize:"9px",letterSpacing:"2.5px",fontWeight:"700",marginBottom:"3px"}},"CENTURION BOATS · SUPREME TOW BOATS · DEALER DIGITAL SCORECARD"));
  hdr.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:"8px"}},
    h("div",{},
      h("div",{style:{color:"#fff",fontSize:"18px",fontWeight:"600",marginBottom:"2px"}},d.name),
      h("div",{style:{color:"#aaa",fontSize:"11px"}},"Rep: "+d.rep+"  ·  "+new Date().toLocaleDateString())
    ),
    ov!=null
      ? h("div",{style:{textAlign:"center"}},
          h("div",{style:{background:c.bg,color:c.text,fontSize:"30px",fontWeight:"700",borderRadius:"10px",padding:"4px 16px"}},grade(ov)),
          h("div",{style:{color:"#aaa",fontSize:"10px",marginTop:"3px"}},ov+"/100 overall")
        )
      : h("div",{style:{color:"#aaa",fontSize:"12px",paddingBottom:"4px"}},"Scoring…")
  ));
  wrap.appendChild(hdr);

  // ── Handle Verification Panel ────────────────────────────────────────────
  if(!d.verified)d.verified={};
  const vTotal=Object.values(d.verified).filter(Boolean).length;
  const allVerified=vTotal===CHANNELS.length;

  const verifySection=h("div",{class:"card",style:{marginBottom:"14px"}});
  verifySection.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"6px"}},
    h("div",{},
      h("div",{style:{fontWeight:"600",fontSize:"13px"}},"Verify social handles & URLs"),
      h("div",{style:{fontSize:"11px",color:"#888",marginTop:"2px"}},"Open each link to confirm it's the right business, then check it off. Verified handles are used in the PDF.")
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
      h("span",{style:{
        fontSize:"11px",fontWeight:"600",padding:"3px 10px",borderRadius:"10px",
        background:allVerified?"#d0edda":vTotal>=4?"#fff3cd":"#fde8ec",
        color:allVerified?"#145c2a":vTotal>=4?"#7a5700":"#8b0000"
      }},vTotal+"/"+CHANNELS.length+" verified"),
      !allVerified?h("button",{style:{fontSize:"10px",padding:"3px 9px",color:"#555"},onClick:()=>{
        CHANNELS.forEach(ch=>{d.verified[ch]=true;});R();
      }},"Mark all verified"):null
    )
  ));

  const CHANNEL_URLS={
    "Facebook":  h=>"https://www.facebook.com/"+h.replace(/^.*facebook\.com\//,"").replace(/^@/,""),
    "Instagram": h=>"https://www.instagram.com/"+h.replace(/^@/,"").replace(/^.*instagram\.com\//,""),
    "X (Twitter)":h=>"https://x.com/"+h.replace(/^@/,"").replace(/^.*x\.com\//,"").replace(/^.*twitter\.com\//,""),
    "YouTube":   h=>h.startsWith("http")?h:"https://"+h,
    "TikTok":    h=>"https://www.tiktok.com/@"+h.replace(/^@/,"").replace(/^.*tiktok\.com\/@?/,""),
    "LinkedIn":  h=>h.startsWith("http")?h:"https://"+h,
    "Website":   h=>h.startsWith("http")?h:"https://"+h,
    "Google":    h=>"https://www.google.com/search?q="+encodeURIComponent(h+" boat dealer"),
  };
  const CHANNEL_ICONS={
    "Facebook":"🌐","Instagram":"📸","X (Twitter)":"𝕏","YouTube":"▶",
    "TikTok":"🎵","LinkedIn":"💼","Website":"🔗","Google":"🔍"
  };

  const vgrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"8px"}});
  for(const ch of CHANNELS){
    const handle=d.handles?.[ch]||"";
    const isVerified=!!d.verified[ch];
    const url=handle?CHANNEL_URLS[ch](handle):"";

    const row=h("div",{style:{
      display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",borderRadius:"8px",
      background:isVerified?"#f0faf4":"#fafaf8",
      border:"1.5px solid "+(isVerified?"#a8ddb8":"#e8e8e4"),
      transition:"all .2s"
    }});

    // Checkbox
    const cb=h("input",{type:"checkbox"});
    cb.style.cssText="width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:#1a6b33";
    cb.checked=isVerified;
    cb.addEventListener("change",()=>{
      d.verified[ch]=cb.checked;
      row.style.background=cb.checked?"#f0faf4":"#fafaf8";
      row.style.border="1.5px solid "+(cb.checked?"#a8ddb8":"#e8e8e4");
      // update counter badge
      const newV=Object.values(d.verified).filter(Boolean).length;
      verifySection.querySelector("[data-vcounter]").textContent=newV+"/"+CHANNELS.length+" verified";
      const allDone=newV===CHANNELS.length;
      verifySection.querySelector("[data-vcounter]").style.background=allDone?"#d0edda":newV>=4?"#fff3cd":"#fde8ec";
      verifySection.querySelector("[data-vcounter]").style.color=allDone?"#145c2a":newV>=4?"#7a5700":"#8b0000";
    });
    row.appendChild(cb);

    // Channel info
    const info=h("div",{style:{flex:"1",minWidth:"0"}});
    info.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"600",color:"#333",marginBottom:"2px"}},CHANNEL_ICONS[ch]+" "+ch));
    if(handle){
      info.appendChild(h("div",{style:{fontSize:"10px",color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"130px"}},handle));
    }else{
      info.appendChild(h("div",{style:{fontSize:"10px",color:"#bbb",fontStyle:"italic"}},"No handle set"));
    }
    row.appendChild(info);

    // Open link button
    if(url){
      const openBtn=h("a",{href:url,target:"_blank",style:{
        fontSize:"10px",padding:"3px 7px",borderRadius:"5px",background:"#fff",
        border:"1px solid #ccc",color:"#444",textDecoration:"none",flexShrink:"0",whiteSpace:"nowrap"
      }},"Open ↗");
      row.appendChild(openBtn);
    }else{
      // Edit handle inline
      const editBtn=h("button",{style:{fontSize:"10px",padding:"3px 7px",borderRadius:"5px",background:"#fff",border:"1px solid #ccc",color:"#999",flexShrink:"0"}},"Add");
      editBtn.addEventListener("click",()=>{
        const val=prompt("Enter handle or URL for "+ch+":");
        if(val&&val.trim()){d.handles[ch]=val.trim();R();}
      });
      row.appendChild(editBtn);
    }

    vgrid.appendChild(row);
  }

  // Tag the counter span so we can update it without re-render
  const counterSpan=verifySection.querySelector("span");
  if(counterSpan)counterSpan.setAttribute("data-vcounter","1");

  verifySection.appendChild(vgrid);

  // Warning if unverified handles present when analysis is run
  if(!allVerified&&d.ready){
    verifySection.appendChild(h("div",{style:{marginTop:"10px",fontSize:"11px",color:"#7a5700",background:"#fff8e6",borderRadius:"7px",padding:"8px 12px",border:"1px solid #f0d890"}},
      "⚠ "+( CHANNELS.length-vTotal)+" handle"+(CHANNELS.length-vTotal!==1?"s":"")+" not yet verified. Scores are based on the handles shown — verify them for more accurate results."
    ));
  }

  wrap.appendChild(verifySection);

  // ── Brand Link Checker ───────────────────────────────────────────────────
  const website = d.handles?.["Website"] || d.website || "";
  const linkCard = h("div",{class:"card",style:{marginBottom:"14px"}});

  linkCard.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"6px"}},
    h("div",{},
      h("div",{style:{fontWeight:"600",fontSize:"13px"}},"Brand link verification"),
      h("div",{style:{fontSize:"11px",color:"#888",marginTop:"2px"}},"Checks if the dealer website links to centurionboats.com and supremetowboats.com")
    ),
    h("button",{style:{fontSize:"11px",padding:"4px 12px",borderRadius:"7px",background:DARK,color:"#fff",border:"none",fontWeight:"600"},
      onClick:()=>runLinkCheck(d, linkCard)
    },"▶ Check now")
  ));

  // Status rows for each brand
  const brands=[
    {key:"centurion", label:"centurionboats.com",     domain:"centurionboats.com",     color:"#C41230"},
    {key:"supreme",   label:"supremetowboats.com",     domain:"supremetowboats.com",    color:"#1a3a6b"},
  ];

  const statusRows = h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  for(const brand of brands){
    const check = d.linkCheck?.[brand.key];
    const statusRow = h("div",{style:{
      display:"flex",alignItems:"center",gap:"10px",padding:"9px 12px",
      borderRadius:"8px",background:"#fafaf8",border:"1.5px solid #eee"
    },"data-brand-row":brand.key});

    // Brand indicator dot
    statusRow.appendChild(h("div",{style:{width:"10px",height:"10px",borderRadius:"50%",background:brand.color,flexShrink:"0"}}));
    statusRow.appendChild(h("div",{style:{flex:"1",fontWeight:"600",fontSize:"12px"}},brand.label));

    // Status badge
    let badgeBg="#ebebeb", badgeText="#888", badgeLabel="Not checked";
    if(check==="found")   {badgeBg="#d0edda";badgeText="#145c2a";badgeLabel="✓ Link found";}
    else if(check==="missing"){badgeBg="#fde8ec";badgeText="#8b0000";badgeLabel="✗ No link found";}
    else if(check==="checking"){badgeBg="#e8f4fd";badgeText="#0c4a7a";badgeLabel="Checking…";}
    else if(check==="error"){badgeBg="#fff8e6";badgeText="#7a5700";badgeLabel="Could not fetch";}

    statusRow.appendChild(h("span",{
      style:{fontSize:"11px",fontWeight:"600",padding:"2px 10px",borderRadius:"10px",background:badgeBg,color:badgeText},
      "data-brand-badge":brand.key
    },badgeLabel));

    statusRows.appendChild(statusRow);
  }
  linkCard.appendChild(statusRows);

  // Website URL shown
  if(website){
    linkCard.appendChild(h("div",{style:{marginTop:"8px",fontSize:"11px",color:"#aaa"}},
      "Checking: ",h("span",{style:{color:"#555"}},website)
    ));
  }else{
    linkCard.appendChild(h("div",{style:{marginTop:"8px",fontSize:"11px",color:"#c00"}},"No website URL set — add one in the verify panel above."));
  }

  // Last checked timestamp
  if(d.linkCheckDate){
    linkCard.appendChild(h("div",{style:{marginTop:"4px",fontSize:"10px",color:"#bbb"}},"Last checked: "+d.linkCheckDate));
  }

  wrap.appendChild(linkCard);

  // ── Channel tabs ─────────────────────────────────────────────────────────
  const tabs=h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"14px"}});
  for(const ch of CHANNELS){
    const s=chAvg(d,ch);const cc=scoreColor(s);const active=S.activeChannel===ch;
    tabs.appendChild(h("button",{
      style:{fontSize:"11px",padding:"5px 10px",borderRadius:"7px",
        background:active?BRAND:"#f0f0f0",color:active?"#fff":"#333",
        border:active?"none":"1.5px solid #ddd",fontWeight:active?"700":"400"},
      onClick:()=>{S.activeChannel=ch;R();}
    },ch.split(" ")[0]," ",
      h("span",{style:{fontSize:"10px",padding:"1px 5px",borderRadius:"4px",marginLeft:"2px",
        background:active?"rgba(255,255,255,.25)":cc.bg,color:active?"#fff":cc.text}},s!=null?s:"-")
    ));
  }
  wrap.appendChild(tabs);

  // ── Channel panel ────────────────────────────────────────────────────────
  const ch=S.activeChannel;
  const ca=chAvg(d,ch);const cc2=scoreColor(ca);
  const panel=h("div",{class:"card"});

  panel.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}},
    h("div",{},
      h("div",{style:{fontWeight:"600",fontSize:"15px"}},ch),
      d.handles?.[ch]
        ? h("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"3px"}},
            h("span",{style:{fontSize:"11px",color:"#666"}},d.handles[ch]),
            d.verified?.[ch]
              ? h("span",{style:{fontSize:"10px",padding:"1px 7px",borderRadius:"10px",background:"#d0edda",color:"#145c2a",fontWeight:"600"}},"✓ Verified")
              : h("span",{style:{fontSize:"10px",padding:"1px 7px",borderRadius:"10px",background:"#fde8ec",color:"#8b0000",fontWeight:"600"}},"Unverified")
          )
        : h("div",{style:{fontSize:"11px",color:"#bbb",fontStyle:"italic",marginTop:"2px"}},"No handle — add one in the verify panel above")
    ),
    ca!=null?h("div",{style:{background:cc2.bg,color:cc2.text,fontWeight:"700",fontSize:"13px",borderRadius:"7px",padding:"3px 12px"}},grade(ca)+" · "+ca+"/100")
    :h("div",{style:{fontSize:"12px",color:"#aaa"}},"No scores yet")
  ));

  // KPI grid — inputs update d.scores directly, NO re-render on keystroke
  const kgrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:"8px",marginBottom:"16px"}});
  for(const kpi of KPIS[ch]){
    const s=d.scores?.[ch]?.[kpi]??null;
    const kc=scoreColor(s);
    const kcard=h("div",{style:{background:"#f8f8f6",borderRadius:"8px",padding:"10px 12px",border:"1.5px solid #eee"}});
    kcard.appendChild(h("div",{style:{fontSize:"11px",color:"#666",marginBottom:"6px",fontWeight:"500"}},kpi));
    // Score bar
    const barWrap=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}});
    const barTrack=h("div",{style:{flex:"1",height:"6px",background:"#e4e4e4",borderRadius:"3px",overflow:"hidden"}});
    const barFill=h("div",{style:{height:"100%",width:(s||0)+"%",background:s?kc.text:"transparent",borderRadius:"3px",transition:"width .3s"}});
    barTrack.appendChild(barFill);
    barWrap.appendChild(barTrack);
    barWrap.appendChild(h("div",{style:{background:kc.bg,color:kc.text,fontSize:"11px",fontWeight:"700",borderRadius:"4px",padding:"1px 6px",minWidth:"28px",textAlign:"center"}},s!=null?s:"-"));
    kcard.appendChild(barWrap);

    // Score input — updates state WITHOUT re-rendering
    const inp=h("input",{type:"number",min:"0",max:"100",placeholder:"0–100",value:s!=null?String(s):""});
    inp.addEventListener("input",()=>{
      const v=parseInt(inp.value);
      if(!d.scores)d.scores={};
      if(!d.scores[ch])d.scores[ch]={};
      if(!isNaN(v)&&v>=0&&v<=100){
        d.scores[ch][kpi]=v;
        d.ready=true;
        // Update bar and badge in-place without re-render
        const newC=scoreColor(v);
        barFill.style.width=v+"%";
        barFill.style.background=newC.text;
        barWrap.lastChild.textContent=String(v);
        barWrap.lastChild.style.background=newC.bg;
        barWrap.lastChild.style.color=newC.text;
        // Update channel tab badge
        updateTabBadge(ch,d);
        // Update header grade
        updateHeaderGrade(d);
      }else if(inp.value===""){
        d.scores[ch][kpi]=null;
        barFill.style.width="0%";
        barFill.style.background="transparent";
        barWrap.lastChild.textContent="-";
        barWrap.lastChild.style.background="#ebebeb";
        barWrap.lastChild.style.color="#888";
        updateTabBadge(ch,d);
        updateHeaderGrade(d);
      }
    });
    // Full re-render only on blur to refresh action items + save
    inp.addEventListener("blur",()=>{
      if(inp.value!==""){saveState();R();}
    });
    kcard.appendChild(inp);
    kgrid.appendChild(kcard);
  }
  panel.appendChild(kgrid);
  wrap.appendChild(panel);

  // Action items
  if(ca!=null){
    const tier=ca<50?"low":ca<75?"mid":"high";
    const tl=ca<50?"Foundation":ca<75?"Growth":"Advanced";
    const tc=ca<50?{bg:"#fde8ec",text:"#8b0000"}:ca<75?{bg:"#fff3cd",text:"#7a5700"}:{bg:"#d0edda",text:"#145c2a"};
    const acts=ACTIONS[tier][ch]||[];
    const acard=h("div",{class:"card"});
    acard.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},
      h("div",{style:{fontWeight:"600",fontSize:"13px"}},"Action items — "+ch),
      h("span",{style:{background:tc.bg,color:tc.text,fontSize:"10px",padding:"2px 9px",borderRadius:"10px",fontWeight:"700"}},tl+" · "+ca+"/100")
    ));
    const ul=h("ul",{style:{paddingLeft:"18px",display:"flex",flexDirection:"column",gap:"5px"}});
    for(const a of acts)ul.appendChild(h("li",{style:{fontSize:"12px",lineHeight:"1.65"}},a));
    acard.appendChild(ul);
    wrap.appendChild(acard);
  }

  // Bottom share button — always visible
  wrap.appendChild(h("div",{style:{marginTop:"8px",paddingTop:"14px",borderTop:"1.5px solid #e8e8e8",textAlign:"center"}},
    h("button",{class:"btn-green",style:{fontSize:"13px",padding:"10px 30px"},onClick:()=>openSharePDF(d)},"↗ Share with dealer — generate PDF")
  ));

  return wrap;
}

// Live-update helpers (avoid full re-render while typing)
function updateTabBadge(ch,d){
  // find all tab buttons by iterating — they're identified by text
  document.querySelectorAll("button").forEach(b=>{
    if(b.textContent.trim().startsWith(ch.split(" ")[0]+" ")){
      const s=chAvg(d,ch);const cc=scoreColor(s);
      const badge=b.querySelector("span");
      if(badge){badge.textContent=s!=null?String(s):"-";badge.style.background=cc.bg;badge.style.color=cc.text;}
    }
  });
}
function updateHeaderGrade(d){
  const ov=totalAvg(d);const c=scoreColor(ov);
  const gradeEl=document.querySelector("[data-grade]");
  if(gradeEl&&ov!=null){gradeEl.textContent=grade(ov);Object.assign(gradeEl.style,{background:c.bg,color:c.text});}
}

// ─────────────────────────────────────────────────────────────────────────────
// PAGE: MANAGE REPS
// ─────────────────────────────────────────────────────────────────────────────
function pageReps(){
  const wrap=h("div",{class:"fade",style:{maxWidth:"420px"}});
  wrap.appendChild(h("button",{style:{marginBottom:"14px"},onClick:()=>{S.view="list";R();}},"← Back"));
  const card=h("div",{class:"card"});
  card.appendChild(h("div",{style:{fontWeight:"600",fontSize:"15px",marginBottom:"4px"}},"Edit rep names"));
  card.appendChild(h("div",{style:{fontSize:"12px",color:"#666",marginBottom:"16px",lineHeight:"1.6"}},"Renaming a rep updates all their dealer assignments automatically."));
  const inputs=[];
  for(let i=0;i<4;i++){
    const row=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"}});
    row.appendChild(h("span",{style:{fontSize:"11px",color:"#888",width:"38px",flexShrink:"0"}},"Rep "+(i+1)));
    const inp=h("input",{value:S.reps[i],placeholder:"Rep name",type:"text"});
    inputs.push(inp);row.appendChild(inp);card.appendChild(row);
  }
  card.appendChild(h("button",{class:"btn-red",style:{width:"100%",marginTop:"8px",padding:"9px"}},
    ...["Save rep names"]
  ));
  card.lastChild.addEventListener("click",()=>{
    for(let i=0;i<4;i++){
      const old=S.reps[i];const nw=inputs[i].value.trim()||("Rep "+(i+1));
      S.reps[i]=nw;
      S.dealers.forEach(d=>{if(d.rep===old)d.rep=nw;});
      if(S.selectedRep===old)S.selectedRep=nw;
    }
    S.view="list";R();
  });
  wrap.appendChild(card);
  return wrap;
}

// PAGE: METHODOLOGY
// ─────────────────────────────────────────────────────────────────────────────
function pageMethodology(){
  const wrap=h("div",{class:"fade"});
  wrap.appendChild(h("button",{style:{marginBottom:"14px"},onClick:()=>{S.view="list";R();}},"← Back"));
  wrap.appendChild(h("div",{style:{background:DARK,borderRadius:"12px",padding:"14px 20px",marginBottom:"14px"}},
    h("div",{style:{color:BRAND,fontSize:"9px",letterSpacing:"2.5px",fontWeight:"700",marginBottom:"2px"}},"CENTURION BOATS · SUPREME TOW BOATS"),
    h("div",{style:{color:"#fff",fontSize:"15px",fontWeight:"600"}},"Scoring Methodology")
  ));
  wrap.appendChild(h("div",{style:{fontSize:"12px",color:"#555",marginBottom:"14px",lineHeight:"1.75",background:"#fff",borderRadius:"10px",padding:"12px 16px",border:"1.5px solid #ddd"}},
    "Each of the 8 channels is scored out of 100 using 8 KPIs. Scores are auto-generated by the built-in analysis engine or entered manually. Channel score = average of its 8 KPIs. Overall score = average of all 8 channel scores.",
    h("br"),h("br"),
    h("strong",{},"Grades: "),"A = 90–100 · B = 80–89 · C = 70–79 · D = 60–69 · F = below 60",
    h("br"),
    h("strong",{},"Tiers: "),"Foundation = below 50 · Growth = 50–74 · Advanced = 75+"
  ));
  for(const{ch,rows}of METHODOLOGY){
    const sec=h("div",{class:"card",style:{marginBottom:"10px"}});
    sec.appendChild(h("div",{style:{fontWeight:"700",fontSize:"13px",color:BRAND,marginBottom:"10px"}},ch));
    const tbl=h("div",{style:{display:"flex",flexDirection:"column",gap:"5px"}});
    for(const[kpi,det]of rows){
      tbl.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"165px 1fr",gap:"8px",fontSize:"12px",lineHeight:"1.6"}},
        h("div",{style:{fontWeight:"600"}},kpi),
        h("div",{style:{color:"#555"}},det)
      ));
    }
    sec.appendChild(tbl);wrap.appendChild(sec);
  }
  return wrap;
}

(function boot(){

  loadState();

  for(const ed of EAST_DEALERS){
    if(!S.dealers.find(d=>d.name===ed.name)){

  // 4. Render
  R();
})();
